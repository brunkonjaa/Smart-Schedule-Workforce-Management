name: Backend checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smart_schedule_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_schedule_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      APP_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/smart_schedule_test
      NODE_ENV: test
      SESSION_SECRET: ci-only-smart-schedule-session-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: backend/package-lock.json
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate isolated CI password pepper
        run: node -e "const fs=require('fs'),crypto=require('crypto');fs.appendFileSync(process.env.GITHUB_ENV,'PASSWORD_PEPPER_CURRENT_VERSION=1\\nPASSWORD_PEPPER_V1='+crypto.randomBytes(32).toString('base64url')+'\\n')"

      - name: Apply migrations
        run: npm run db:migrate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Measure password hashing under concurrent load
        run: npm run security:benchmark

      - name: Check production dependency advisories
        run: npm audit --omit=dev

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          if-no-files-found: warn
