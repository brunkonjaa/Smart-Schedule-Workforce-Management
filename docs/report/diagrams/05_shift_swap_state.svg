<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1050" viewBox="0 0 1700 1050">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16343B"/></marker></defs>
<rect width="1700" height="1050" fill="#FFFFFF"/>
<text x="60" y="66" font-family="Arial" font-size="34" font-weight="700" fill="#16343B">Shift-swap state and decision flow</text>
<line x1="60" y1="82" x2="1640" y2="82" stroke="#2F8792" stroke-width="4"/>
<rect x="650" y="220" width="280" height="86" rx="43.0" fill="#F4E4C1" stroke="#0F6070" stroke-width="3"/>
<text x="790.0" y="270.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="790.0" dy="0">PENDING</tspan></text>
<rect x="650" y="500" width="280" height="86" rx="43.0" fill="#DCEFF0" stroke="#0F6070" stroke-width="3"/>
<text x="790.0" y="550.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="790.0" dy="0">ACCEPTED</tspan></text>
<rect x="1180" y="740" width="280" height="86" rx="43.0" fill="#E7F0DC" stroke="#3C7A57" stroke-width="3"/>
<text x="1320.0" y="790.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="1320.0" dy="0">APPROVED</tspan></text>
<rect x="250" y="740" width="280" height="86" rx="43.0" fill="#F7E6E4" stroke="#A7443E" stroke-width="3"/>
<text x="390.0" y="790.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="390.0" dy="0">REJECTED</tspan></text>
<rect x="250" y="500" width="280" height="86" rx="43.0" fill="#F0F0F0" stroke="#0F6070" stroke-width="3"/>
<text x="390.0" y="550.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="390.0" dy="0">CANCELLED</tspan></text>
<rect x="1180" y="220" width="280" height="86" rx="43.0" fill="#F0F0F0" stroke="#0F6070" stroke-width="3"/>
<text x="1320.0" y="270.0" text-anchor="middle" font-family="Arial" font-size="23" font-weight="600" fill="#16343B"><tspan x="1320.0" dy="0">EXPIRED</tspan></text>
<rect x="80" y="220" width="340" height="86" rx="43.0" fill="#FFFFFF" stroke="#0F6070" stroke-width="3"/>
<text x="250.0" y="270.0" text-anchor="middle" font-family="Arial" font-size="21" font-weight="600" fill="#16343B"><tspan x="250.0" dy="0">Future owned assignment</tspan></text>
<line x1="420" y1="263" x2="650" y2="263" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="535.0" y="255.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="535.0" dy="0">requester creates</tspan></text>
<line x1="790" y1="306" x2="790" y2="500" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="790.0" y="395.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="790.0" dy="0">target or eligible staff accepts</tspan></text>
<line x1="930" y1="543" x2="1180" y2="783" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1055.0" y="655.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1055.0" dy="0">manager approves</tspan></text>
<line x1="650" y1="550" x2="530" y2="740" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="590.0" y="637.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="590.0" dy="0">manager rejects</tspan></text>
<line x1="650" y1="520" x2="530" y2="543" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="590.0" y="523.5" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="590.0" dy="0">request withdrawn</tspan></text>
<line x1="930" y1="250" x2="1180" y2="250" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1055.0" y="242.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1055.0" dy="0">future lifecycle rule</tspan></text>
<rect x="1030" y="455" width="590" height="205" rx="12" fill="#FFFFFF" stroke="#3C7A57" stroke-width="3"/>
<text x="1060" y="495" text-anchor="start" font-family="Arial" font-size="20" font-weight="600" fill="#16343B"><tspan x="1060" dy="0">Approval transaction</tspan><tspan x="1060" dy="34">The accepted staff profile is checked again.</tspan><tspan x="1060" dy="34">updateAssignment applies role, leave, conflict and weekly limits.</tspan><tspan x="1060" dy="34">Only then is shift_assignments.staff_profile_id changed.</tspan><tspan x="1060" dy="34">A failed final check leaves the swap unapproved.</tspan></text>
<rect x="80" y="365" width="460" height="150" rx="12" fill="#FFFFFF" stroke="#B9862E" stroke-width="3"/>
<text x="105" y="405" text-anchor="start" font-family="Arial" font-size="18" font-weight="400" fill="#16343B"><tspan x="105" dy="0">Creation gates</tspan><tspan x="105" dy="31">Owner of assignment; shift after today; OPEN status;</tspan><tspan x="105" dy="31">one PENDING/ACCEPTED request per assignment;</tspan><tspan x="105" dy="31">named target must be active and have the required role.</tspan></text>
<text x="850" y="970" text-anchor="middle" font-family="Arial" font-size="19" font-weight="400" fill="#62777C"><tspan x="850" dy="0">PENDING and ACCEPTED are the active states returned by the current list route. CANCELLED and EXPIRED exist in the database status rule but have no current transition route.</tspan></text>
</svg>