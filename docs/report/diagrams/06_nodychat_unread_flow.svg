<text x="980.0" y="156.0" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="#16343B"><tspan x="980.0" dy="0">Chat service</tspan></text>
<line x1="980" y1="178" x2="980" y2="1060" stroke="#62777C" stroke-width="2" stroke-dasharray="8 7"/>
<rect x="1295" y="120" width="270" height="58" rx="29.0" fill="#DCEFF0" stroke="#0F6070" stroke-width="3"/>
<text x="1430.0" y="156.0" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="#16343B"><tspan x="1430.0" dy="0">PostgreSQL</tspan></text>
<line x1="1430" y1="178" x2="1430" y2="1060" stroke="#62777C" stroke-width="2" stroke-dasharray="8 7"/>
<line x1="160" y1="235" x2="560" y2="235" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="360.0" y="227.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="360.0" dy="0">GET /chat/messages or WS bootstrap</tspan></text>
<line x1="560" y1="305" x2="980" y2="305" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="770.0" y="297.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="770.0" dy="0">active session user ID</tspan></text>
<line x1="980" y1="375" x2="1430" y2="375" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1205.0" y="367.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1205.0" dy="0">ensure WORKPLACE participant</tspan></text>
<line x1="980" y1="445" x2="1430" y2="445" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1205.0" y="437.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1205.0" dy="0">load only participant conversations</tspan></text>
<line x1="1430" y1="515" x2="980" y2="515" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="1205.0" y="507.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1205.0" dy="0">messages + per-conversation unread count</tspan></text>
<line x1="980" y1="585" x2="560" y2="585" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="770.0" y="577.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="770.0" dy="0">conversation list + first unread ID</tspan></text>
<line x1="560" y1="655" x2="160" y2="655" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="360.0" y="647.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="360.0" dy="0">render unread marker; scroll to first unread</tspan></text>
<line x1="160" y1="735" x2="560" y2="735" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="360.0" y="727.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="360.0" dy="0">open/read/send action</tspan></text>
<line x1="560" y1="805" x2="980" y2="805" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="770.0" y="797.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="770.0" dy="0">validate message and conversation membership</tspan></text>
<line x1="980" y1="875" x2="1430" y2="875" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1205.0" y="867.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1205.0" dy="0">insert message or upsert read state</tspan></text>
<line x1="980" y1="945" x2="1430" y2="945" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1205.0" y="937.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1205.0" dy="0">select participant user IDs</tspan></text>
<line x1="980" y1="1015" x2="560" y2="1015" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="770.0" y="1007.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="770.0" dy="0">broadcast only to those sockets</tspan></text>
<line x1="560" y1="1080" x2="160" y2="1080" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="360.0" y="1072.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="360.0" dy="0">append message / update unread badge</tspan></text>
<rect x="1130" y="185" width="600" height="145" rx="12" fill="#F7E6E4" stroke="#A7443E" stroke-width="3"/>
<text x="1160" y="220" text-anchor="start" font-family="Arial" font-size="18" font-weight="600" fill="#16343B"><tspan x="1160" dy="0">Denied paths</tspan><tspan x="1160" dy="31">No active session or cross-origin WebSocket -&gt; reject upgrade</tspan><tspan x="1160" dy="31">Not a DIRECT participant -&gt; no load, send, read update or broadcast</tspan><tspan x="1160" dy="31">Self/inactive direct target -&gt; 400; message outside 1..1000 chars -&gt; 400</tspan></text>
<text x="900" y="1125" text-anchor="middle" font-family="Arial" font-size="18" font-weight="400" fill="#62777C"><tspan x="900" dy="0">Read state key: (user_id, conversation_id). The stored last_read_message_id is only advanced when that message belongs to a conversation containing the current user.</tspan></text>
</svg>