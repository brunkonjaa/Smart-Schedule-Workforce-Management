<text x="560.0" y="156.0" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="#16343B"><tspan x="560.0" dy="0">HTTP / WebSocket</tspan></text>
<line x1="560" y1="178" x2="560" y2="1060" stroke="#62777C" stroke-width="2" stroke-dasharray="8 7"/>
