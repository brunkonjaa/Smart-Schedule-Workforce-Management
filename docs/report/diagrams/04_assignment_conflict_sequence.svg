<line x1="1290" y1="475" x2="900" y2="475" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="1095.0" y="467.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1095.0" dy="0">shift + staff rows</tspan></text>
<line x1="900" y1="555" x2="1290" y2="555" stroke="#16343B" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1095.0" y="547.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1095.0" dy="0">check OPEN and active</tspan></text>
