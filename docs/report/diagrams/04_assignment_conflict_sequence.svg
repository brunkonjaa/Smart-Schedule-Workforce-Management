<text x="1095.0" y="757.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1095.0" dy="0">calculate Monday-Sunday shifts/hours</tspan></text>
<line x1="1290" y1="835" x2="900" y2="835" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="1095.0" y="827.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1095.0" dy="0">current count + projected hours</tspan></text>
