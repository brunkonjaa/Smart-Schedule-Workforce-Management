<text x="1265.0" y="967.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1265.0" dy="0">write before/after evidence</tspan></text>
<line x1="900" y1="1045" x2="520" y2="1045" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="710.0" y="1037.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="710.0" dy="0">saved assignment + contract warning(s)</tspan></text>
<line x1="520" y1="1110" x2="150" y2="1110" stroke="#16343B" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
<text x="335.0" y="1102.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="335.0" dy="0">201 saved, or 409 conflict</tspan></text>
<rect x="1030" y="525" width="570" height="335" rx="12" fill="#FFF7E8" stroke="#B9862E" stroke-width="2"/>
<text x="1055" y="560" text-anchor="start" font-family="Arial" font-size="18" font-weight="700" fill="#16343B"><tspan x="1055" dy="0">Hard-stop order</tspan><tspan x="1055" dy="36">1. shift is OPEN</tspan><tspan x="1055" dy="36">2. staff and user are active</tspan><tspan x="1055" dy="36">3. required role matches</tspan><tspan x="1055" dy="36">4. no approved leave</tspan><tspan x="1055" dy="36">5. no overlapping or touching assignment</tspan><tspan x="1055" dy="36">6. projected week &lt;= 5 shifts</tspan><tspan x="1055" dy="36">7. projected week &lt;= 40 hours</tspan></text>
<text x="900" y="1170" text-anchor="middle" font-family="Arial" font-size="19" font-weight="400" fill="#A7443E"><tspan x="900" dy="0">Contract hours are not a hard stop. If projected hours pass the staff profile contract but stay within 40, the save succeeds and returns a warning.</tspan></text>
