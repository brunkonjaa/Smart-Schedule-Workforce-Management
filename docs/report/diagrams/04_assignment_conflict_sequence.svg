<text x="1095.0" y="897.0" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#16343B"><tspan x="1095.0" dy="0">insert only if &lt;= 5 shifts and &lt;= 40 h</tspan></text>
