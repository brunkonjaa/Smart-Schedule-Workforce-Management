<text x="60" y="66" font-family="Arial" font-size="34" font-weight="700" fill="#16343B">Smart Schedule live database ERD after migration 022</text>
<line x1="60" y1="82" x2="2340" y2="82" stroke="#2F8792" stroke-width="4"/>
<text x="60" y="115" text-anchor="start" font-family="Arial" font-size="20" font-weight="400" fill="#62777C"><tspan x="60" dy="0">PK = primary key, FK = foreign key, UQ = unique. user_sessions is created by the PostgreSQL session store.</tspan></text>
<rect x="60" y="150" width="350" height="266" rx="12" fill="#FFFFFF" stroke="#0F6070" stroke-width="3"/>
<path d="M 60 194 H 410" stroke="#0F6070" stroke-width="2"/>
<text x="74" y="179" text-anchor="start" font-family="Arial" font-size="18" font-weight="700" fill="#16343B"><tspan x="74" dy="0">users</tspan></text>
<text x="74" y="218" text-anchor="start" font-family="Arial" font-size="17" font-weight="400" fill="#16343B"><tspan x="74" dy="0">PK id UUID</tspan><tspan x="74" dy="23">UQ email varchar</tspan><tspan x="74" dy="23">password_hash varchar</tspan><tspan x="74" dy="23">role MANAGER|STAFF</tspan><tspan x="74" dy="23">is_active boolean</tspan><tspan x="74" dy="23">must_change_password boolean</tspan><tspan x="74" dy="23">password_changed_at timestamptz?</tspan><tspan x="74" dy="23">created_at, updated_at</tspan></text>
