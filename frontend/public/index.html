<!DOCTYPE html>
<html lang="en" class="app-loading">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Smart Schedule" />
    <title>Smart Schedule</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="../src/styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <a class="brand-mark" href="#overview" aria-label="Smart Schedule home">
            <span>SS</span>
          </a>
          <div class="brand-copy">
            <p class="brand-kicker">Hospitality Workforce Management</p>
            <h1>Smart Schedule</h1>
          </div>
        </div>

        <nav class="top-nav" aria-label="Primary"></nav>

        <div class="header-actions">
          <span class="user-greeting" id="user-greeting" hidden></span>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
            <span class="theme-toggle-label">Dark mode</span>
          </button>
        </div>
      </header>

      <main class="app-main">
        <section class="page-intro" id="page-intro"></section>
        <section class="workspace" id="workspace" aria-live="polite"></section>
      </main>

      <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top" title="Back to top">↑</button>

      <footer class="app-footer">
        <p class="app-footer-credit">Made by Bruno Suric</p>
        <div class="app-footer-contact" aria-label="Contact details">
          <a href="mailto:brunkonjaa@gmail.com">brunkonjaa@gmail.com</a>
          <a href="tel:+353863944105">0863944105</a>
        </div>
      </footer>
    </div>

    <script src="../src/pages/page-config.js"></script>
    <script src="../src/services/preview-state.js"></script>
    <script src="../src/services/api-client.js"></script>
    <script src="../src/services/live-ui-helpers.js"></script>
    <script src="../src/services/overview-ui.js"></script>
    <script src="../src/services/audit-logs-ui.js"></script>
    <script src="../src/services/session-ui.js"></script>
    <script src="../src/services/staff-manager.js"></script>
    <script src="../src/services/leave-ui.js"></script>
    <script src="../src/services/swap-requests-ui.js"></script>
    <script src="../src/services/shifts-ui.js"></script>
    <script src="../src/services/assignments-ui.js"></script>
    <script src="../src/services/rota-ui.js"></script>
    <script src="../src/components/layout.js"></script>
    <script src="../src/services/pwa.js"></script>
    <script src="../src/scripts/app.js"></script>
  </body>
</html>
